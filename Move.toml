[package]
name = "Desnet"
version = "0.3.1"
upgrade_policy = "compatible"
authors = ["Rera", "Claude (Anthropic)"]
license = "Unlicense"

# DeSNet v0.3.1 — compat upgrade adding handle_fee_vault module.
# v0.3.1 changes (additive only — preserves all v0.3.0-r3 audit fixes + v0.3.0.6 chunked-upgrade infra):
#   - NEW module: supra_fee_vault (auto-init at publish via init_module)
#   - NEW friend `desnet::supra_fee_vault` on supra_vault + governance
#   - NEW view `factory::vault_addr_of_handle(handle): address`
#   - NEW friend fn `supra_vault::burn_via_vault(addr, fa)` — delegate burn pattern
#   - profile::register_handle BODY: route handle fee → supra_fee_vault::deposit_supra_fa
#     (state.fee_receiver field becomes vestigial; signature unchanged for compat)
# All darbitex deps dropped (policy chain unblocked). See docs/v0.3.0-design-lock.md.

[addresses]
# Filled at deploy via --named-addresses CLI flag.
# Mainnet: desnet=0x7ba7ee5a..., origin=0x000073c4..., desnet_claimer=0x000073c4...
desnet = "_"
origin = "_"
desnet_claimer = "_"
# darbitex handle: claimer = darbitex Final pkg/publisher multisig (3/5).
darbitex_claimer = "0xc988d39a4a27b26e1d659431a0c5828f3862c155d1c331386cd5974298dd78dd"
# d handle: claimer = D Supra pkg (resource_account, SEALED — no signer derivable).
# Permanent reservation = effective burn. Slot can never be registered.
d_claimer = "0x587c80846b18b7d7c3801fe11e88ca114305a5153082b51d0d2547ad48622c77"
# supra handle: claimer = Darbitex treasury multisig (3/5).
supra_claimer = "0xdbce89113a975826028236f910668c3ff99c8db8981be6a448caa2f8836f9576"
# supra handle: claimer = dedicated multisig.
# (Duplicate removed)

[dev-addresses]
desnet = "0xDADE"
origin = "0xA0E1"
desnet_claimer = "0xC0FFEE10"

[dependencies.DesnetBootstrap]
local = "../desnet-bootstrap"

[dependencies.SupraFramework]
git = "https://github.com/Entropy-Foundation/aptos-core.git"
rev = "main"
subdir = "aptos-move/framework/supra-framework"

[dependencies.SupraStdlib]
git = "https://github.com/Entropy-Foundation/aptos-core.git"
rev = "main"
subdir = "aptos-move/framework/aptos-stdlib"

[dependencies.SupraTokenObjects]
git = "https://github.com/Entropy-Foundation/aptos-core.git"
rev = "main"
subdir = "aptos-move/framework/aptos-token-objects"

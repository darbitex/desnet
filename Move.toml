[package]
name = "Desnet"
version = "0.3.0-r2"
upgrade_policy = "compatible"
authors = ["Rera", "Claude (Anthropic)"]
license = "Unlicense"

# DeSNet v0.3.0 mainnet baseline — pre-handle_fee_vault state with reservation guard
# (5 reserved handles: desnet/darbitex/d/aptos/apt → @origin only).
# Compat upgrade to v0.3.1 (handle_fee_vault) follows registration of "desnet" by @origin.
# All darbitex deps dropped (policy chain unblocked). See docs/v0.3.0-design-lock.md.

[addresses]
desnet = "_"
origin = "_"
# Reserved handle claimers — each reserved handle bound to one specific addr.
# desnet handle: claimer = @origin (deployer multisig, dynamic at deploy).
desnet_claimer = "_"
# darbitex handle: claimer = darbitex Final pkg/publisher multisig (3/5).
darbitex_claimer = "0xc988d39a4a27b26e1d659431a0c5828f3862c155d1c331386cd5974298dd78dd"
# d handle: claimer = D Aptos pkg (resource_account, SEALED — no signer derivable).
# Permanent reservation = effective burn. Slot can never be registered.
d_claimer = "0x587c80846b18b7d7c3801fe11e88ca114305a5153082b51d0d2547ad48622c77"
# aptos handle: claimer = Darbitex treasury multisig (3/5).
aptos_claimer = "0xdbce89113a975826028236f910668c3ff99c8db8981be6a448caa2f8836f9576"
# apt handle: claimer = dedicated multisig.
apt_claimer = "0xf1b522effb90aef79395f97b9c39d6acbd8fdf84ec046361359a48de2e196566"

[dev-addresses]
desnet = "0xDADE"
origin = "0xA0E1"
desnet_claimer = "0xC0FFEE10"

[dependencies.AptosFramework]
git = "https://github.com/aptos-labs/aptos-core.git"
rev = "mainnet"
subdir = "aptos-move/framework/aptos-framework"

[dependencies.AptosStdlib]
git = "https://github.com/aptos-labs/aptos-core.git"
rev = "mainnet"
subdir = "aptos-move/framework/aptos-stdlib"

[dependencies.AptosTokenObjects]
git = "https://github.com/aptos-labs/aptos-core.git"
rev = "mainnet"
subdir = "aptos-move/framework/aptos-token-objects"
